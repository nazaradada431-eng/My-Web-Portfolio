<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIPID0IK | Roblox Dev</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Consolas', monospace;
    }

    body {
      background: #0a0a0a;
      color: #e5e5e5;
      overflow-x: hidden;
      line-height: 1.6;
    }


    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 100, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 100, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
      pointer-events: none;
    }


    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ff66, #00ffaa, #00ff66, transparent);
      margin: 60px 100px;
      box-shadow: 0 0 20px #00ff66;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 60px;
      border-bottom: 1px solid rgba(0, 255, 102, 0.15);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(8px);
    }

    header h1 {
      color: #00ff66;
      font-size: 28px;
      text-shadow: 0 0 15px #00ff66;
    }

    nav a {
      margin-left: 30px;
      text-decoration: none;
      color: #888;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00ff88;
      text-shadow: 0 0 10px #00ff66;
    }

    .hero {
      height: 95vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 100px;
      position: relative;
    }

    .tag {
      color: #00ff66;
      margin-bottom: 15px;
      font-size: 18px;
      text-shadow: 0 0 10px #00ff66;
    }

    .hero h2 {
      font-size: 68px;
      line-height: 1.1;
      color: #ffffff;
    }

    .typing {
      color: #00ff88;
      border-right: 3px solid #00ff66;
      padding-right: 8px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    .hero p {
      color: #aaaaaa;
      margin-top: 20px;
      font-size: 22px;
    }

    .buttons {
      margin-top: 40px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      margin-right: 15px;
      border: 2px solid #00ff66;
      color: #00ff66;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.4s;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
    }

    .btn:hover {
      background: #00ff66;
      color: #000;
      box-shadow: 0 0 30px #00ff66;
      transform: translateY(-3px);
    }

    section {
      padding: 100px 100px;
    }

    h2 {
      font-size: 42px;
      margin-bottom: 40px;
      color: #00ff88;
      text-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .skill {
      background: rgba(0, 255, 102, 0.08);
      border: 1px solid rgba(0, 255, 102, 0.3);
      padding: 10px 22px;
      color: #00ff99;
      transition: all 0.3s;
    }

    .skill:hover {
      background: rgba(0, 255, 102, 0.2);
      border-color: #00ff66;
      color: white;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
      transform: translateY(-2px);
    }


    .contact-links {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .contact-btn {
      padding: 16px 40px;
      background: transparent;
      border: 2px solid #00ff66;
      color: #00ff66;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.4s;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .contact-btn:hover {
      background: #00ff66;
      color: #000;
      box-shadow: 0 0 35px #00ff66;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #444;
      border-top: 1px solid rgba(0, 255, 102, 0.1);
    }

    @media (max-width: 768px) {
      section, .hero { padding-left: 40px; padding-right: 40px; }
      header { padding: 20px 40px; }
      .hero h2 { font-size: 52px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Pipid0ik</h1>
  <nav>
    <a href="#">home</a>
    <a href="#skills">skills</a>
    <a href="#contact">contact</a>
  </nav>
</header>

<section class="hero">
  <div class="tag">$ whoami</div>
  <h2>
    <span id="typing" class="typing"></span>
  </h2>
  <p>I create Roblox systems, scripts and game mechanics</p>

  <div class="buttons">
    <a class="btn" href="https://t.me/portfolisko" target="_blank">Telegram</a>
    <a class="btn" href="https://discord.com/users/1464970685024571596" target="_blank">Discord</a>
  </div>
</section>

<div class="divider"></div>

<section id="skills">
  <h2>01. skills</h2>
  <div class="skills">
    <div class="skill">LuaU</div>
    <div class="skill">Roblox Studio</div>
    <div class="skill">Python</div>
    <div class="skill">HTML + CSS</div>
    <div class="skill">UI/UX Design</div>
  </div>
</section>

<div class="divider"></div>

<section id="contact">
  <h2>02. contact</h2>
  <p style="font-size:20px; margin-bottom:20px;">Let's create something cool together</p>
  
  <div class="contact-links">
    <button onclick="window.open('https://t.me/portfolisko', '_blank')" class="contact-btn">
      → Telegram портфолио
    </button>
    <button onclick="window.open('https://discord.com/users/1464970685024571596', '_blank')" class="contact-btn">
      → Discord
    </button>
  </div>
</section>

<footer>
  <p>© 2026 Pipid0ik • Made with neon and caffeine</p>
</footer>

<script>
  const text = ["Pipid0ik", "roblox dev", "luau scripter"];
  let i = 0;
  let j = 0;
  let current = "";
  let isDeleting = false;

  function type() {
    current = text[i];

    if (!isDeleting) {
      document.getElementById("typing").textContent = current.substring(0, j++);
      if (j > current.length) {
        isDeleting = true;
        setTimeout(type, 1200);
        return;
      }
    } else {
      document.getElementById("typing").textContent = current.substring(0, j--);
      if (j < 0) {
        isDeleting = false;
        i = (i + 1) % text.length;
      }
    }

    setTimeout(type, isDeleting ? 40 : 90);
  }

  type();
</script>

</body>
</html>
